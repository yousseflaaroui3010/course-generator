openapi: '3.0.3'
info:
  title: Lumina API
  version: '1.0.0'
  description: |
    Lumina enterprise learning platform API.
    All authenticated endpoints require `Authorization: Bearer <access_token>` (KeyCloak OIDC).
  contact:
    name: Lumina Engineering
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: Versioned API root

# ---------------------------------------------------------------------------
# Security Schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: KeyCloak OIDC access token (5-min TTL, auto-refreshed by oidc-spa)

  # -------------------------------------------------------------------------
  # Reusable Schemas
  # -------------------------------------------------------------------------
  schemas:

    # --- Pagination ---
    PaginationMeta:
      type: object
      required: [cursor, hasMore, total]
      properties:
        cursor:
          type: string
          nullable: true
          description: UUID of the last item — pass as `?cursor=` on next request
        hasMore:
          type: boolean
        total:
          type: integer

    # --- Errors ---
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, status, requestId, timestamp]
          properties:
            code:
              type: string
              example: COURSE_NOT_FOUND
            message:
              type: string
              example: Course with ID abc123 does not exist
            status:
              type: integer
              example: 404
            requestId:
              type: string
              example: req_7f8a9b2c
            timestamp:
              type: string
              format: date-time

    # --- Users ---
    Role:
      type: string
      enum: [student, teacher, admin]

    User:
      type: object
      required: [id, email, role, xp, streak, createdAt]
      properties:
        id:
          type: string
          format: uuid
        keycloakId:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/Role'
        xp:
          type: integer
        streak:
          type: integer
        lastActive:
          type: string
          format: date-time
          nullable: true
        preferences:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
        preferences:
          type: object
          additionalProperties: true

    # --- Courses ---
    CourseLevel:
      type: string
      enum: [beginner, intermediate, advanced]

    CourseStatus:
      type: string
      enum: [draft, processing, published, archived]

    Course:
      type: object
      required: [id, title, level, status, isMarketplace, createdAt]
      properties:
        id:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        level:
          $ref: '#/components/schemas/CourseLevel'
        category:
          type: string
          nullable: true
        price:
          type: string
          description: Decimal string e.g. "29.99"
        status:
          $ref: '#/components/schemas/CourseStatus'
        isMarketplace:
          type: boolean
        batchCount:
          type: integer
        thumbnailUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CourseCreate:
      type: object
      required: [title, level]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        level:
          $ref: '#/components/schemas/CourseLevel'
        category:
          type: string
        price:
          type: string
          pattern: '^\d+\.\d{2}$'
          default: '0.00'
        isMarketplace:
          type: boolean
          default: false

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        level:
          $ref: '#/components/schemas/CourseLevel'
        category:
          type: string
        price:
          type: string
        status:
          $ref: '#/components/schemas/CourseStatus'
        isMarketplace:
          type: boolean

    # --- Chapters ---
    Chapter:
      type: object
      required: [id, courseId, batchIndex, chapterIndex, title, createdAt]
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        batchIndex:
          type: integer
        chapterIndex:
          type: integer
        title:
          type: string
        content:
          type: string
          nullable: true
        visualMetadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    # --- Quiz ---
    QuizQuestion:
      type: object
      required: [id, chapterId, question, options, correctIndex]
      properties:
        id:
          type: string
          format: uuid
        chapterId:
          type: string
          format: uuid
        question:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 6
        correctIndex:
          type: integer
        explanation:
          type: string
          nullable: true
        orderIndex:
          type: integer

    QuizAttempt:
      type: object
      required: [id, userId, chapterId, answers, score, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        chapterId:
          type: string
          format: uuid
        answers:
          type: array
          items:
            type: integer
        score:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time

    QuizSubmit:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: integer
          description: Selected option indices, one per question

    # --- Progress ---
    Progress:
      type: object
      required: [userId, courseId, percentComplete]
      properties:
        userId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        completedChapters:
          type: array
          items:
            type: string
            format: uuid
        percentComplete:
          type: number
          format: float
        lastChapterId:
          type: string
          format: uuid
          nullable: true
        updatedAt:
          type: string
          format: date-time

    ProgressUpdate:
      type: object
      required: [completedChapterId]
      properties:
        completedChapterId:
          type: string
          format: uuid

    # --- Notes ---
    Note:
      type: object
      required: [id, userId, chapterId, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        chapterId:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NoteUpsert:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # --- AI / Jobs ---
    GenerateCourseRequest:
      type: object
      required: [fileId, config]
      properties:
        fileId:
          type: string
          format: uuid
        config:
          type: object
          required: [title, level]
          properties:
            title:
              type: string
            level:
              $ref: '#/components/schemas/CourseLevel'
            tone:
              type: string
              enum: [academic, casual, professional]
            category:
              type: string
            includeQuizzes:
              type: boolean
              default: true
            includeVisuals:
              type: boolean
              default: false
            batchCount:
              type: integer
              minimum: 1
              maximum: 10

    ExtendCourseRequest:
      type: object
      required: [additionalContent]
      properties:
        additionalContent:
          type: string
        batchCount:
          type: integer
          minimum: 1
          maximum: 5

    RewriteRequest:
      type: object
      required: [content, instruction]
      properties:
        content:
          type: string
        instruction:
          type: string
          example: 'Simplify for beginners'

    NarrateRequest:
      type: object
      required: [chapterId]
      properties:
        chapterId:
          type: string
          format: uuid
        voice:
          type: string
          default: alloy

    GenerateVisualRequest:
      type: object
      required: [chapterId, prompt]
      properties:
        chapterId:
          type: string
          format: uuid
        prompt:
          type: string

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatRequest:
      type: object
      required: [chapterId, message]
      properties:
        chapterId:
          type: string
          format: uuid
        message:
          type: string

    VideoScriptRequest:
      type: object
      required: [chapterId]
      properties:
        chapterId:
          type: string
          format: uuid
        style:
          type: string
          enum: [explainer, tutorial, documentary]
          default: explainer

    JobStatus:
      type: string
      enum: [queued, active, completed, failed, stalled]

    Job:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: string
        queueName:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        result:
          type: object
          nullable: true
          additionalProperties: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    JobAccepted:
      type: object
      required: [jobId, statusUrl]
      properties:
        jobId:
          type: string
        statusUrl:
          type: string
          example: /api/v1/jobs/abc123

    # --- Upload ---
    UploadResponse:
      type: object
      required: [fileId, originalName]
      properties:
        fileId:
          type: string
          format: uuid
        originalName:
          type: string
        sizeBytes:
          type: integer

    # --- Marketplace ---
    MarketplaceCourse:
      type: object
      required: [id, title, level, price, isMarketplace]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        level:
          $ref: '#/components/schemas/CourseLevel'
        category:
          type: string
          nullable: true
        price:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        creatorDisplayName:
          type: string
          nullable: true
        reviewCount:
          type: integer
        averageRating:
          type: number
          format: float
          nullable: true
        isMarketplace:
          type: boolean

    # --- Cart ---
    CartItem:
      type: object
      required: [courseId, addedAt]
      properties:
        courseId:
          type: string
          format: uuid
        course:
          $ref: '#/components/schemas/MarketplaceCourse'
        addedAt:
          type: string
          format: date-time

    CartAddRequest:
      type: object
      required: [courseId]
      properties:
        courseId:
          type: string
          format: uuid

    # --- Payments ---
    CheckoutRequest:
      type: object
      required: [courseIds]
      properties:
        courseIds:
          type: array
          items:
            type: string
            format: uuid
        couponCode:
          type: string

    CheckoutResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Stripe Checkout session URL

    Purchase:
      type: object
      required: [id, userId, courseId, amount, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        amount:
          type: string
        status:
          type: string
          enum: [pending, completed, refunded, failed]
        stripePaymentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    SubscriptionPlan:
      type: string
      enum: [free, pro, enterprise]

    Subscription:
      type: object
      required: [userId, plan, status]
      properties:
        userId:
          type: string
          format: uuid
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
        status:
          type: string
          enum: [active, cancelled, expired, trialing]
        stripeCustomerId:
          type: string
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true

    SubscriptionCheckoutRequest:
      type: object
      required: [plan]
      properties:
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'

    # --- Instructor / Coupons ---
    Coupon:
      type: object
      required: [id, courseId, code, discountPct, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        code:
          type: string
        discountPct:
          type: integer
          minimum: 1
          maximum: 100
        maxUses:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time

    CouponCreate:
      type: object
      required: [courseId, code, discountPct, expiresAt]
      properties:
        courseId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 3
          maxLength: 50
        discountPct:
          type: integer
          minimum: 1
          maximum: 100
        maxUses:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time

    InstructorAnalytics:
      type: object
      required: [totalStudents, totalRevenue, courses]
      properties:
        totalStudents:
          type: integer
        totalRevenue:
          type: string
        courses:
          type: array
          items:
            type: object
            properties:
              courseId:
                type: string
                format: uuid
              title:
                type: string
              enrollments:
                type: integer
              revenue:
                type: string
              averageProgress:
                type: number

    # --- Assignments ---
    Assignment:
      type: object
      required: [id, courseId, title, createdAt]
      properties:
        id:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AssignmentCreate:
      type: object
      required: [courseId, title]
      properties:
        courseId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
          format: date-time

    Submission:
      type: object
      required: [id, assignmentId, studentId, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        assignmentId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        content:
          type: string
        grade:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time

    SubmissionCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    Review:
      type: object
      required: [id, submissionId, reviewerId, rating, comment, createdAt]
      properties:
        id:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
        reviewerId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewCreate:
      type: object
      required: [rating, comment]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          minLength: 1

    # --- Admin ---
    AdminStats:
      type: object
      required: [totalUsers, totalCourses, totalRevenue, activeJobs]
      properties:
        totalUsers:
          type: integer
        totalCourses:
          type: integer
        totalRevenue:
          type: string
        activeJobs:
          type: integer
        usersByRole:
          type: object
          properties:
            student:
              type: integer
            teacher:
              type: integer
            admin:
              type: integer

    # --- Settings ---
    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        notifications:
          type: boolean
        dyslexicFont:
          type: boolean
        language:
          type: string

    # --- Certificates ---
    Certificate:
      type: object
      required: [id, userId, courseId, verificationCode, issuedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        verificationCode:
          type: string
        pdfUrl:
          type: string
          nullable: true
        issuedAt:
          type: string
          format: date-time

    # --- Health ---
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
              enum: [ok, down]
            redis:
              type: string
              enum: [ok, down]
            keycloak:
              type: string
              enum: [ok, down]

  # -------------------------------------------------------------------------
  # Reusable Parameters
  # -------------------------------------------------------------------------
  parameters:
    cursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Cursor for pagination (UUID of last item from previous page)
    limitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    courseIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # -------------------------------------------------------------------------
  # Reusable Responses
  # -------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authenticated but insufficient role/ownership
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ValidationError:
      description: Request body or params failed Zod validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

# ---------------------------------------------------------------------------
# Global security — overridden per-endpoint where Public
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # HEALTH
  # ==========================================================================
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns status of DB, Redis, and KeyCloak
      security: []
      tags: [Health]
      responses:
        '200':
          description: Platform healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==========================================================================
  # AUTH
  # ==========================================================================
  /auth/login:
    get:
      operationId: authLogin
      summary: Redirect to KeyCloak login
      security: []
      tags: [Auth]
      responses:
        '302':
          description: Redirect to KeyCloak OIDC authorization endpoint

  /auth/callback:
    get:
      operationId: authCallback
      summary: OIDC callback — exchange code for tokens
      security: []
      tags: [Auth]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to app dashboard after successful token exchange
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      operationId: authLogout
      summary: Revoke session and tokens
      tags: [Auth]
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # USERS
  # ==========================================================================
  /users/me:
    get:
      operationId: getMe
      summary: Get current authenticated user
      tags: [Users]
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateMe
      summary: Update current user profile
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      operationId: deleteMe
      summary: Delete account (GDPR cascade)
      tags: [Users]
      responses:
        '204':
          description: Account deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/avatar:
    post:
      operationId: uploadAvatar
      summary: Upload user avatar to Supabase Storage
      tags: [Users]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                required: [avatarUrl]
                properties:
                  avatarUrl:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # COURSES
  # ==========================================================================
  /courses:
    get:
      operationId: listMyCourses
      summary: List authenticated user's courses
      tags: [Courses]
      parameters:
        - $ref: '#/components/parameters/cursorParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: User's courses
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Course'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createCourse
      summary: Create a draft course record
      tags: [Courses]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          description: Draft course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /courses/{id}:
    parameters:
      - $ref: '#/components/parameters/courseIdParam'

    get:
      operationId: getCourse
      summary: Get course (access-controlled by ownership/purchase/subscription)
      tags: [Courses]
      responses:
        '200':
          description: Course detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '401':
