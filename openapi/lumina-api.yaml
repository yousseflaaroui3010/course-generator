      summary: Platform-wide statistics (admin only)
      tags: [Admin]
      responses:
        '200':
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/data:
    delete:
      operationId: clearAllData
      summary: Clear all platform data (admin only — requires confirmation header)
      tags: [Admin]
      parameters:
        - name: X-Confirm-Clear
          in: header
          required: true
          schema:
            type: string
            enum: ['YES_DELETE_EVERYTHING']
      responses:
        '204':
          description: All data cleared
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/queues:
    get:
      operationId: getBullBoard
      summary: Bull Board queue dashboard proxy (admin only)
      tags: [Admin]
      responses:
        '200':
          description: Bull Board HTML dashboard
          content:
            text/html:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================================================
  # SETTINGS
  # ==========================================================================
  /settings:
    get:
      operationId: getSettings
      summary: Get user preferences
      tags: [Settings]
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      operationId: updateSettings
      summary: Update user preferences
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settings/reset-password:
    post:
      operationId: resetPassword
      summary: Trigger KeyCloak password reset email
      tags: [Settings]
      responses:
        '204':
          description: Password reset email sent
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # CERTIFICATES
  # ==========================================================================
  /certificates/{courseId}:
    post:
      operationId: generateCertificate
      summary: Generate completion certificate for a course
      tags: [Certificates]
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Certificate generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '400':
          description: Course not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Certificate already issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /certificates/verify/{code}:
    get:
      operationId: verifyCertificate
      summary: Publicly verify a certificate by code
      security: []
      tags: [Certificates]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Certificate valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          $ref: '#/components/responses/NotFound'

