# ---------------------------------------------------------------------------
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Courses
  - name: Upload
  - name: AI
  - name: Jobs
  - name: Marketplace
  - name: Cart
  - name: Payments
  - name: Progress
  - name: Notes
  - name: Instructor
  - name: Assignments
  - name: Admin
  - name: Settings
  - name: Certificates
